<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Success - Welcome!</title>
    <style>
        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
        }

        body {
            font-family: 'Segoe UI', Tahoma, Geneva, Verdana, sans-serif;
            background: linear-gradient(135deg, #667eea 0%, #764ba2 100%);
            min-height: 100vh;
            display: flex;
            justify-content: center;
            align-items: center;
            padding: 20px;
        }

        .container {
            background: white;
            border-radius: 15px;
            box-shadow: 0 20px 60px rgba(0, 0, 0, 0.3);
            padding: 50px;
            max-width: 500px;
            width: 100%;
            text-align: center;
            animation: slideIn 0.5s ease-out;
        }

        @keyframes slideIn {
            from {
                opacity: 0;
                transform: translateY(20px);
            }
            to {
                opacity: 1;
                transform: translateY(0);
            }
        }

        .success-icon {
            width: 100px;
            height: 100px;
            margin: 0 auto 30px;
            background: linear-gradient(135deg, #4caf50 0%, #45a049 100%);
            border-radius: 50%;
            display: flex;
            justify-content: center;
            align-items: center;
            font-size: 50px;
            animation: bounce 0.6s ease-out;
        }

        @keyframes bounce {
            0% {
                transform: scale(0);
            }
            50% {
                transform: scale(1.1);
            }
            100% {
                transform: scale(1);
            }
        }

        h1 {
            color: #333;
            margin-bottom: 10px;
            font-size: 28px;
        }

        .username {
            color: #667eea;
            font-weight: 600;
            font-size: 18px;
        }

        .subtitle {
            color: #666;
            margin: 20px 0 30px;
            font-size: 14px;
        }

        .status-box {
            background: #f0f7ff;
            border-left: 4px solid #4caf50;
            padding: 20px;
            border-radius: 8px;
            margin: 30px 0;
            text-align: left;
        }

        .status-item {
            display: flex;
            align-items: center;
            margin: 12px 0;
            color: #333;
            font-size: 14px;
        }

        .status-icon {
            width: 24px;
            height: 24px;
            background: #4caf50;
            color: white;
            border-radius: 50%;
            display: flex;
            justify-content: center;
            align-items: center;
            margin-right: 12px;
            font-size: 14px;
            font-weight: bold;
        }

        .button-group {
            display: flex;
            gap: 10px;
            margin-top: 30px;
        }

        .btn {
            flex: 1;
            padding: 12px 20px;
            border: none;
            border-radius: 8px;
            font-size: 14px;
            font-weight: 600;
            cursor: pointer;
            transition: all 0.3s ease;
        }

        .btn-primary {
            background: linear-gradient(135deg, #667eea 0%, #764ba2 100%);
            color: white;
        }

        .btn-primary:hover {
            transform: translateY(-2px);
            box-shadow: 0 10px 25px rgba(102, 126, 234, 0.4);
        }

        .btn-secondary {
            background: #f0f0f0;
            color: #333;
            border: 1px solid #ddd;
        }

        .btn-secondary:hover {
            background: #e8e8e8;
        }

        .footer {
            margin-top: 30px;
            color: #999;
            font-size: 12px;
        }

        .already-member {
            background: #fff3cd;
            border-left: 4px solid #ffc107;
            padding: 15px;
            border-radius: 5px;
            margin: 20px 0;
            text-align: left;
            font-size: 13px;
            color: #856404;
        }
    </style>
</head>
<body>
    <div class="container">
        <div class="success-icon">✓</div>
        
        <h1>Welcome!</h1>
        <p class="subtitle">You've successfully authorized</p>
        <p class="username" id="username">User</p>

        <div id="alreadyMemberBox" class="already-member" style="display: none;">
            ℹ️ You were already a member of our server!
        </div>

        <div class="status-box">
            <div class="status-item">
                <div class="status-icon">✓</div>
                <span>Discord account verified</span>
            </div>
            <div class="status-item">
                <div class="status-icon">✓</div>
                <span>Added to server</span>
            </div>
            <div class="status-item">
                <div class="status-icon">✓</div>
                <span>Ready to go!</span>
            </div>
        </div>

        <div class="button-group">
            <button class="btn btn-primary" onclick="openDiscord()">
                Open Discord
            </button>
            <button class="btn btn-secondary" onclick="goHome()">
                Go Home
            </button>
        </div>

        <div class="footer">
            <p>You can now access all server features</p>
        </div>
    </div>

    <script>
        // Get username from URL query parameter
        const params = new URLSearchParams(window.location.search);
        const username = params.get('username') || 'User';
        const alreadyMember = params.get('alreadyMember') === 'true';

        document.getElementById('username').textContent = username;
        
        if (alreadyMember) {
            document.getElementById('alreadyMemberBox').style.display = 'block';
        }

        function openDiscord() {
            // Open Discord app or web
            window.open('https://discord.com/app', '_blank');
        }

        function goHome() {
            window.location.href = '/';
        }

        // Auto-redirect after 5 seconds
        setTimeout(() => {
            // Uncomment to auto-redirect
            // window.location.href = '/';
        }, 5000);
    </script>
</body>
</html>
